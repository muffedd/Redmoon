<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page not found — Redmoon">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Cpath d='M20 5C20 5 12 12 12 20C12 28 20 35 20 35C20 35 28 28 28 20C28 12 20 5 20 5Z' fill='%230B0B0A'/%3E%3C/svg%3E">
    <title>404 — Redmoon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-hero {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--page-margin);
            background: var(--cream);
            text-align: center;
        }
        .error-hero__code {
            font: var(--font-hero);
            font-size: clamp(80px, 20vw, 160px);
            color: var(--ink);
            opacity: 0.08;
            line-height: 1;
            margin-bottom: var(--space-md);
        }
        .error-hero__title {
            font: var(--font-section);
            font-size: clamp(28px, 5vw, 48px);
            color: var(--ink);
            margin-bottom: var(--space-sm);
        }
        .error-hero__text {
            font: var(--font-body);
            color: var(--muted-ink);
            max-width: 40ch;
            margin-bottom: var(--space-md);
        }
        .error-hero__link {
            display: inline-flex;
            align-items: center;
            padding: clamp(10px, 2vw, 14px) clamp(18px, 3vw, 28px);
            border-radius: var(--radius-pill);
            border: 1px solid var(--ink);
            background: var(--ink);
            color: var(--cream);
            font: var(--font-body);
            font-weight: 500;
            text-decoration: none;
            transition: background var(--duration-base) var(--ease-out-expo),
                        color var(--duration-base) var(--ease-out-expo);
        }
        .error-hero__link:hover {
            background: transparent;
            color: var(--ink);
        }
    </style>
</head>
<body>

    <header class="nav" id="nav">
        <div class="nav__inner grid">
            <a href="javascript:history.back()" class="nav__back" aria-label="Go back">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 4L6 10l6 6"/>
                </svg>
            </a>
            <a href="index.html" class="nav__logo">REDMOON</a>
            <div class="nav__right">
                <a href="projects.html" class="nav__link">Work</a>
                <a href="about.html" class="nav__link">About</a>
                <a href="contact.html" class="nav__link">Contact</a>
                <button class="nav__menu-btn" id="menuBtn" aria-label="Open menu">
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-overlay__inner">
            <button class="menu-overlay__close" id="menuClose" aria-label="Close menu">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M15 5L5 15M5 5l10 10"/>
                </svg>
            </button>
            <nav class="menu-overlay__nav">
                <a href="projects.html">Work</a>
                <a href="about.html">About</a>
                <a href="process.html">Process</a>

                <a href="contact.html">Contact</a>
            </nav>
            <div class="menu-overlay__social">
                <a href="#">LinkedIn</a>
                <a href="#">Instagram</a>
                <a href="#">X</a>
            </div>
        </div>
    </div>

    <section class="error-hero">
        <span class="error-hero__code">404</span>
        <h1 class="error-hero__title">This page does not exist.</h1>
        <p class="error-hero__text">It may have been moved, renamed, or never existed in the first place. Let us get you back on track.</p>
        <a href="index.html" class="error-hero__link">Back to home</a>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script src="gsap-animations.js"></script>

    <script src="script.js"></script>
</body>
</html>
